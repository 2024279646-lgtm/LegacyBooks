<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Legacy Books</title>
    <link rel="stylesheet" href="checkout.css">
</head>
<body>

    <div class="container">
        <h2>Checkout</h2>
        <p class="subtitle">Please fill in your delivery details and choose a payment method.</p>

        <form id="checkout-form" onsubmit="placeOrder(event)">
            
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" placeholder="Enter your full name" required>

            <label for="phone">Phone Number</label>
            <input type="text" id="phone" placeholder="Enter your phone number" required>

            <label for="address">Address</label>
            <textarea id="address" rows="4" placeholder="Enter your address" required></textarea>

            <label for="postcode">Postcode</label>
            <input type="text" id="postcode" placeholder="Enter postcode" required>

            <label for="state">State</label>
            <input type="text" id="state" placeholder="Enter state" required>

            <h3>Select Payment Method</h3>

            <div class="payment-option">
                <input type="radio" id="onlinebanking" name="payment_method" value="Online Banking" onchange="togglePaymentFields()" required>
                <label for="onlinebanking">Online Banking (FPX)</label>
            </div>

            <div id="bank-box" class="hidden-box">
                <label for="bank-select">Select Your Bank</label>
                <select id="bank-select">
                    <option value="">-- Choose Bank --</option>
                    <option value="CIMB">CIMB</option>
                    <option value="RHB">RHB</option>
                    <option value="Bank Islam">Bank Islam</option>
                    <option value="BSN">BSN</option>
                    <option value="Hong Leong Bank">Hong Leong Bank</option>
                    <option value="Public Bank">Public Bank</option>
                </select>
            </div>

            <div class="payment-option">
                <input type="radio" id="card" name="payment_method" value="Credit/Debit Card" onchange="togglePaymentFields()">
                <label for="card">Credit / Debit Card</label>
            </div>

            <div id="card-box" class="hidden-box">
                <label for="card-number">Card Number</label>
                <input type="text" id="card-number" placeholder="1234 5678 9012 3456">
            </div>

            <div class="payment-option">
                <input type="radio" id="ewallet" name="payment_method" value="E-Wallet" onchange="togglePaymentFields()">
                <label for="ewallet">E-Wallet</label>
            </div>

            <button type="submit">Place Order</button>
        </form>
    </div>

    <script>
        function togglePaymentFields() {
            var selectedMethod = document.querySelector('input[name="payment_method"]:checked').value;

            var bankBox = document.getElementById("bank-box");
            var bankSelect = document.getElementById("bank-select");

            var cardBox = document.getElementById("card-box");
            var cardInput = document.getElementById("card-number");

            if (selectedMethod === "Online Banking") {
                bankBox.style.display = "block";
                bankSelect.required = true;

                cardBox.style.display = "none";
                cardInput.required = false;
                cardInput.value = "";
            } 
            else if (selectedMethod === "Credit/Debit Card") {
                cardBox.style.display = "block";
                cardInput.required = true;

                bankBox.style.display = "none";
                bankSelect.required = false;
                bankSelect.value = "";
            } 
            else {
                bankBox.style.display = "none";
                bankSelect.required = false;
                bankSelect.value = "";

                cardBox.style.display = "none";
                cardInput.required = false;
                cardInput.value = "";
            }
        }

        function placeOrder(event) {
            event.preventDefault();

            var fullName = document.getElementById("fullname").value;
            var paymentMethod = document.querySelector('input[name="payment_method"]:checked').value;

            if (paymentMethod === "Online Banking") {
                var bank = document.getElementById("bank-select").value;
                alert("Thank you " + fullName + "! Your order has been placed successfully via Online Banking (" + bank + ").");
            } 
            else if (paymentMethod === "Credit/Debit Card") {
                var cardNumber = document.getElementById("card-number").value;
                alert("Thank you " + fullName + "! Your order has been placed successfully via Credit/Debit Card ending with " + cardNumber.slice(-4) + ".");
            } 
            else {
                alert("Thank you " + fullName + "! Your order has been placed successfully via E-Wallet.");
            }

            document.getElementById("checkout-form").reset();
            document.getElementById("bank-box").style.display = "none";
            document.getElementById("card-box").style.display = "none";
        }
    </script>

</body>
</html>
